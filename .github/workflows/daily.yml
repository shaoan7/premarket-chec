name: Premarket Check

on:
  schedule:
    # UTC 時間。台灣時間 8:00 = UTC 0:00
    # 注意：GitHub Actions 排程會延遲 5-15 分鐘
    - cron: '35 0 * * 1-5'
  # 允許手動觸發（方便測試）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run premarket check
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python premarket_check.py
